<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Iron Pulse Gym</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">IRON <span>PULSE</span></div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="membership.html">Membership</a></li>
                 <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="checkout-section">
        <div class="checkout-container">
            <h2>Complete Your <span>Registration</span></h2>
            
            <form id="checkout-form" onsubmit="handlePayment(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label>Card Details</label>
                    <input type="text" placeholder="1234 5678 9101 1121" maxlength="16" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" placeholder="***" maxlength="3" required>
                    </div>
                </div>

                <button type="submit" class="btn checkout-btn">Pay Now</button>
            </form>
        </div>
    </section>

    <script>
        function handlePayment(event) {
            event.preventDefault(); // Prevents the page from refreshing
            alert("Payment Successful! Welcome to the Iron Pulse family, Boss.");
            window.location.href = "index.html"; // Redirects back to home
        }
    </script>

</body>
</html>
